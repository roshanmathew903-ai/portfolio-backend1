name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Backend Dependencies
      run: |
        cd "portfolio backend"
        npm install
        
    - name: Lint Frontend
      run: |
        # Basic lint for HTML/CSS can be added here
        # For now, just checking if files exist
        ls index.html script.js style.css
